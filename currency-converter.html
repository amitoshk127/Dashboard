<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>INR Currency Converter</title>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:25px;
    width:400px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:10px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:5px;
}

.results{
    margin-top:15px;
    max-height:300px;
    overflow:auto;
}

.row{
    padding:6px;
    border-bottom:1px solid #eee;
}
</style>

</head>

<body>

<div class="container">

<h3>Currency Converter</h3>

<p><b>From:</b> India - INR</p>

<input type="number" id="amount" placeholder="Enter amount in INR">

<button onclick="convert()">Convert</button>

<div class="results" id="results"></div>

</div>

<script>

async function convert(){

let amount = document.getElementById("amount").value;

if(!amount){
alert("Enter amount");
return;
}

let url = "https://open.er-api.com/v6/latest/INR";

let response = await fetch(url);
let data = await response.json();

let rates = data.rates;

let results = document.getElementById("results");
results.innerHTML = "";

for(let currency in rates){

let value = (amount * rates[currency]).toFixed(2);

let div = document.createElement("div");
div.className = "row";

div.innerHTML = currency + " : " + value;

results.appendChild(div);

}

}

</script>

</body>
</html>
