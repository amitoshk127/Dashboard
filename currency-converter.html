<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Currency Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        }

        .input-focus {
            transition: all 0.2s ease;
        }

        .input-focus:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .swap-btn:active {
            transform: rotate(180deg);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-lg bg-white rounded-[2rem] shadow-2xl p-8 space-y-8">
        <!-- Header -->
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-bold text-slate-800">Currency Converter</h1>
            <p class="text-slate-500 text-sm">Real-time exchange rates for global markets</p>
        </div>

        <!-- Converter Form -->
        <div class="space-y-6">
            <!-- Amount Input -->
            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Amount</label>
                <div class="input-focus flex items-center bg-slate-50 border-2 border-slate-100 rounded-2xl p-4">
                    <span id="symbol-display" class="text-xl font-bold text-slate-400 mr-3">$</span>
                    <input type="number" id="amount" value="1.00" step="0.01" 
                        class="bg-transparent w-full text-2xl font-bold text-slate-800 outline-none"
                        oninput="convertCurrency()">
                </div>
            </div>

            <!-- Currency Selectors -->
            <div class="grid grid-cols-1 md:grid-cols-[1fr_auto_1fr] gap-4 items-center">
                <!-- From -->
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">From</label>
                    <select id="from-currency" onchange="updateSymbol(); convertCurrency()"
                        class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-semibold text-slate-700 outline-none focus:border-blue-500 appearance-none cursor-pointer">
                        <option value="USD" selected>USD - US Dollar</option>
                        <option value="EUR">EUR - Euro</option>
                        <option value="GBP">GBP - British Pound</option>
                        <option value="JPY">JPY - Japanese Yen</option>
                        <option value="INR">INR - Indian Rupee</option>
                        <option value="AUD">AUD - Australian Dollar</option>
                        <option value="CAD">CAD - Canadian Dollar</option>
                        <option value="SGD">SGD - Singapore Dollar</option>
                    </select>
                </div>

                <!-- Swap Button -->
                <button onclick="swapCurrencies()" 
                    class="swap-btn transition-transform duration-300 p-3 mt-6 bg-blue-50 text-blue-600 rounded-full hover:bg-blue-600 hover:text-white group">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                    </svg>
                </button>

                <!-- To -->
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">To</label>
                    <select id="to-currency" onchange="convertCurrency()"
                        class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-semibold text-slate-700 outline-none focus:border-blue-500 appearance-none cursor-pointer">
                        <option value="USD">USD - US Dollar</option>
                        <option value="EUR" selected>EUR - Euro</option>
                        <option value="GBP">GBP - British Pound</option>
                        <option value="JPY">JPY - Japanese Yen</option>
                        <option value="INR">INR - Indian Rupee</option>
                        <option value="AUD">AUD - Australian Dollar</option>
                        <option value="CAD">CAD - Canadian Dollar</option>
                        <option value="SGD">SGD - Singapore Dollar</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Result Display -->
        <div class="bg-blue-600 rounded-[1.5rem] p-8 text-white text-center shadow-lg shadow-blue-200">
            <p id="rate-text" class="text-blue-100 text-sm mb-2">1 USD = 0.92 EUR</p>
            <div class="flex items-center justify-center gap-2">
                <span id="to-symbol" class="text-2xl font-bold opacity-60">€</span>
                <h2 id="result-text" class="text-5xl font-extrabold tracking-tight">0.92</h2>
            </div>
        </div>

        <!-- Info Footer -->
        <div id="last-updated" class="text-center text-xs text-slate-400 font-medium">
            Fetching latest market data...
        </div>
    </div>

    <script>
        // Mocked or static rates in case API fails
        const fallbackRates = {
            "USD": 1, "EUR": 0.92, "GBP": 0.79, "JPY": 150.2, 
            "INR": 82.9, "AUD": 1.53, "CAD": 1.35, "SGD": 1.34
        };

        const symbols = {
            "USD": "$", "EUR": "€", "GBP": "£", "JPY": "¥", 
            "INR": "₹", "AUD": "A$", "CAD": "C$", "SGD": "S$"
        };

        let exchangeRates = { ...fallbackRates };

        async function fetchRates() {
            try {
                const response = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await response.json();
                if (data && data.rates) {
                    exchangeRates = data.rates;
                    document.getElementById('last-updated').innerText = `Last Updated: ${new Date().toLocaleTimeString()}`;
                }
            } catch (error) {
                console.log("Using fallback rates due to API limits/connectivity.");
                document.getElementById('last-updated').innerText = "Live rates unavailable. Using offline data.";
            }
            convertCurrency();
        }

        function updateSymbol() {
            const from = document.getElementById('from-currency').value;
            document.getElementById('symbol-display').innerText = symbols[from] || from;
        }

        function swapCurrencies() {
            const from = document.getElementById('from-currency');
            const to = document.getElementById('to-currency');
            const temp = from.value;
            from.value = to.value;
            to.value = temp;
            updateSymbol();
            convertCurrency();
        }

        function convertCurrency() {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const from = document.getElementById('from-currency').value;
            const to = document.getElementById('to-currency').value;

            // Convert using base USD (API usually returns base USD)
            // formula: amount * (Rate_to / Rate_from)
            const rateFrom = exchangeRates[from];
            const rateTo = exchangeRates[to];
            
            if (rateFrom && rateTo) {
                const converted = (amount * (rateTo / rateFrom)).toFixed(2);
                const singleRate = (rateTo / rateFrom).toFixed(4);

                document.getElementById('result-text').innerText = converted;
                document.getElementById('rate-text').innerText = `1 ${from} = ${singleRate} ${to}`;
                document.getElementById('to-symbol').innerText = symbols[to] || to;
            }
        }

        // Initialize
        window.onload = fetchRates;
    </script>
</body>
</html>
