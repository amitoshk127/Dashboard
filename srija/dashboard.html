<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Dashboard</h2>
        <ul>
            <li>Home</li>
            <li>Analytics</li>
            <li>Reports</li>
            <li>Settings</li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">

        <!-- Header -->
        <div class="header">
            <h1>My Dashboard</h1>
            <p>Welcome User</p>
        </div>

        <!-- Cards -->
        <div class="cards">

            <div class="card">
                <h3>Users</h3>
                <p>120</p>
            </div>

            <div class="card">
                <h3>Revenue</h3>
                <p>$2400</p>
            </div>

            <div class="card">
                <h3>Orders</h3>
                <p>75</p>
            </div>

            <div class="card">
                <h3>Visits</h3>
                <p>430</p>
            </div>

        </div>

    </div>

</div>

</body>
</html>
